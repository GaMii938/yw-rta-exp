
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>グレルリン Lv26 EXP Tracker</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:15px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

.stats{
    font-size:20px;
    line-height:1.8;
}

.multiplier{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.multiplier button{
    flex:1;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

button{
    border:none;
    border-radius:10px;
    padding:15px;
    font-size:16px;
    cursor:pointer;
}

.expBtn{
    background:#4CAF50;
    color:white;
}

.control{
    background:#2196F3;
    color:white;
}

.reset{
    background:#F44336;
    color:white;
}

.active{
    outline:4px solid orange;
}

#history{
    max-height:250px;
    overflow:auto;
    font-size:14px;
}
</style>
</head>
<body>

<h1>グレルリン Lv26</h1>

<div class="card stats">
    経験値: <span id="exp">0</span> / 15245<br>
    残り: <span id="remain">15245</span><br>
    達成率: <span id="percent">0</span>%
</div>

<div class="card">
    <b>経験値倍率</b>
    <div class="multiplier">
        <button id="m1" class="control active" onclick="setMultiplier(1)">1倍</button>
        <button id="m2" class="control" onclick="setMultiplier(2)">2倍</button>
        <button id="m3" class="control" onclick="setMultiplier(3)">3倍</button>
    </div>
</div>

<div class="card">
    <div class="grid" id="buttons"></div>
</div>

<div class="card">
    <button class="control" onclick="undo()">1つ戻す</button>
    <button class="reset" onclick="resetAll()">リセット</button>
</div>

<div class="card">
    <b>履歴</b>
    <div id="history"></div>
</div>

<script>

const targetExp = 15245;
let postBoss = false; //

const battles = [
{ name:"コンビニ裏", exp:12 },
{ name:"魚屋裏", exp:5 },
{ name:"グレルリン", exp:15 },
{ name:"ドンヨリーヌ", exp:25 },

{ name:"結界1", exp:24 },
{ name:"結界2", exp:33 },
{ name:"結界3", exp:30 },

{ name:"ミツマタ", exp:240 },
{ name:"バク", exp:48 },
{ name:"のぼせトンマン", exp:480 },

{ name:"つられたろう丸", exp:750 },
{ name:"ガ鬼", exp:75 },
{ name:"ぎしんあん鬼", exp:93 },
{ name:"でんじん", exp:87 },

{ name:"ランクC", exp:265 },

{ name:"ブカッコウ", exp:108 },
{ name:"ふじのやま", exp:186 },
{ name:"ネクラマテング", exp:153 },

{ name:"おぼろ入道", exp:1160 },

{ name:"ランクB", exp:378 },
{ name:"ベンケイ", exp:217 },
{ name:"グラグライオン", exp:266 },
{ name:"化けあられ", exp:164 },
{ name:"亡霊武者", exp:1880 },
{ name:"鬼くももん", exp:2500 },
{ name:"ランクA", exp:598 },
{ name:"やぶれかぶれ院長", exp:3100 },
{ name:"オロチ", exp:1390 },
{ name:"イカカモネ議長", exp:4200 },
{ name:"ミツマタ2", exp:4500 },
];

let totalExp = Number(localStorage.getItem("totalExp")) || 0;
let history = JSON.parse(localStorage.getItem("history") || "[]");
let multiplier = 1;

function update(){
    document.getElementById("exp").textContent = totalExp;

    const remain = Math.max(0, targetExp-totalExp);
    document.getElementById("remain").textContent = remain;

    document.getElementById("percent").textContent =
        ((totalExp/targetExp)*100).toFixed(1);

    document.getElementById("history").innerHTML =
        history.slice().reverse().join("<br>");

    localStorage.setItem("totalExp", totalExp);
    localStorage.setItem("history", JSON.stringify(history));
}

function setMultiplier(m){
    multiplier = m;

    document.querySelectorAll(".multiplier button")
        .forEach(b=>b.classList.remove("active"));

    document.getElementById("m"+m)
        .classList.add("active");
}

function addExp(name, exp){
    if (name === "のぼせトンマン") {
    postBoss = true;
}

if (!postBoss && name === "ノガッパ") {
    return;
}

    const gained = exp * multiplier;

    totalExp += gained;

    history.push(
        `${name} +${gained} (${multiplier}倍)`
    );

    update();
}

function undo(){

    if(history.length === 0) return;

    const last = history.pop();

    const gained =
        Number(last.match(/\+(\d+)/)[1]);

    totalExp -= gained;

    update();
}

function resetAll(){

    if(!confirm("リセットしますか？")) return;

    totalExp = 0;
    history = [];

    localStorage.clear();

    update();
}

const buttons = document.getElementById("buttons");

battles.forEach(b=>{

    const btn = document.createElement("button");

    btn.className = "expBtn";

    btn.textContent =
        `${b.name}\n+${b.exp}`;

    btn.onclick =
        ()=>addExp(b.name,b.exp);

    buttons.appendChild(btn);

});

update();

</script>

</body>
</html>
