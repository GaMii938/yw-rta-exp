<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RTA EXP Tracker FIX</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:15px;
    background:#111;
    color:white;
}

h1{text-align:center;}

.card{
    background:#1e1e1e;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

button{
    border:none;
    border-radius:10px;
    padding:12px;
    font-size:14px;
    cursor:pointer;
}

.expBtn{background:#2b2b2b;color:white;}
.control{background:#333;color:white;}
.reset{background:#7a1f1f;color:white;}

#history{
    margin-top:10px;
    font-size:12px;
    max-height:150px;
    overflow:auto;
    white-space:pre-line;
}
</style>
</head>

<body>

<h1>RTA EXP Tracker</h1>

<div class="card">
<b>グレルリン Lv26</b><br>
EXP: <span id="gExp">0</span> / 15245<br>
残り: <span id="gRem">15245</span><br><br>

<b>ノガッパ Lv32</b><br>
EXP: <span id="nExp">0</span> / 27650<br>
残り: <span id="nRem">27650</span>
</div>

<div class="card">
<div class="grid" id="grid"></div>
</div>

<div class="card">
<button class="control" onclick="undo()">戻す</button>
<button class="reset" onclick="resetAll()">リセット</button>

<div id="history"></div>
</div>

<script>

// ===== データ =====
const battles = [
{ name:"コンビニ裏", exp:12 },
{ name:"魚屋裏", exp:5 },
{ name:"グレルリン", exp:15 },
{ name:"ドンヨリーヌ", exp:25 },
{ name:"結界1", exp:24 },
{ name:"結界2", exp:33 },
{ name:"結界3", exp:30 },
{ name:"ミツマタ", exp:240 },
{ name:"バク", exp:48 },
{ name:"のぼせトンマン", exp:480 },
{ name:"つられたろう丸", exp:750 },
{ name:"ガ鬼", exp:75 },
{ name:"ぎしんあん鬼", exp:93 },
{ name:"でんじん", exp:87 },
{ name:"ランクC", exp:265 },
{ name:"ブカッコウ", exp:108 },
{ name:"ふじのやま", exp:186 },
{ name:"ネクラマテング", exp:153 },
{ name:"おぼろ入道", exp:1160 },
{ name:"ランクB", exp:378 },
{ name:"ベンケイ", exp:217 },
{ name:"グラグライオン", exp:266 },
{ name:"化けあられ", exp:164 },
{ name:"亡霊武者", exp:1880 },
{ name:"鬼くももん", exp:2500 },
{ name:"ランクA", exp:598 },
{ name:"やぶれかぶれ院長", exp:3100 },
{ name:"オロチ", exp:1390 },
{ name:"イカカモネ議長", exp:4200 },
{ name:"ミツマタ2", exp:4500 }
];

// ===== 状態 =====
let gExp = 0;
let nExp = 0;
let nStart = false;
let history = [];

// ===== UI作成 =====
const grid = document.getElementById("grid");

battles.forEach(b=>{
    const btn = document.createElement("button");
    btn.className = "expBtn";
    btn.textContent = `${b.name}\n+${b.exp}`;
    btn.onclick = ()=>addExp(b);
    grid.appendChild(btn);
});

// ===== EXP追加 =====
function addExp(b){

    let gained = b.exp;

    gExp += gained;

    if(b.name === "つられたろう丸"){
        nStart = true;
    }

    if(nStart){
        nExp += gained;
    }

    history.push(b);

    update();
}

// ===== 戻す =====
function undo(){
    if(history.length === 0) return;

    let last = history.pop();

    gExp -= last.exp;

    if(nStart){
        nExp -= last.exp;
    }

    update();
}

// ===== リセット =====
function resetAll(){
    if(!confirm("リセットする？")) return;

    gExp = 0;
    nExp = 0;
    nStart = false;
    history = [];

    update();
}

// ===== 表示更新 =====
function update(){

    document.getElementById("gExp").textContent = gExp;
    document.getElementById("nExp").textContent = nExp;

    document.getElementById("gRem").textContent = 15245 - gExp;
    document.getElementById("nRem").textContent = 27650 - nExp;

    document.getElementById("history").textContent =
        history.map(h=>h.name + " +"+h.exp).join("\n");
}

update();

</script>
</body>
</html>
